version: "2"

run:
  allow-parallel-runners: true

linters:
  enable:
    - copyloopvar
    - errcheck
    - errname
    - errorlint
    - gocyclo
    - govet
    - ineffassign
    - intrange
    - misspell
    - nakedret
    - perfsprint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 30
    nakedret:
      max-func-lines: 30
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    staticcheck:
      checks:
        - all
        - "-ST1000"  # don't flag missing doc comments (already covered by conventions)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - prefix(go.datum.net)
        - default
